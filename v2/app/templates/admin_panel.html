{% extends "base.html" %} {% block content %}

<style>
  /* ----------- FORCE FULL WIDTH LAYOUT ----------- */
  .main-container,
  .card-container {
    all: unset; /* wipe old styles */
  }

  /* Layout container */
  .admin-wrapper {
    padding: 30px 40px;
    width: 100%;
  }

  /* Header */
  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
  }

  /* Stats cards */
  .admin-stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }

  .admin-card {
    flex: 1;
    min-width: 220px;
    background: #ffffff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    transition: 0.2s ease;
  }

  .admin-card:hover {
    transform: translateY(-3px);
  }

  .admin-card h6 {
    color: #6c757d;
    margin-bottom: 10px;
  }

  .admin-card h2 {
    font-weight: 700;
    margin: 0;
  }

  /* Table styling */
  .admin-table-container {
    background: #ffffff;
    border-radius: 12px;
    padding: 0;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    overflow: hidden;
  }

  .admin-table-container table {
    width: 100%;
    border-collapse: collapse;
  }

  .admin-table-container th,
  .admin-table-container td {
    padding: 14px 18px;
    text-align: left;
    vertical-align: middle;
  }

  .admin-table-container thead {
    background: #f8f9fa;
  }

  .admin-table-container tr:hover {
    background: #f1f3f5;
  }

  /* Badges */
  .role-badge {
    background: #6c757d;
    color: #fff;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
  }

  .team-badge {
    background: #0dcaf0;
    color: #000;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    margin-right: 4px;
  }

  /* Buttons */
  .action-btn {
    padding: 4px 10px;
    font-size: 0.8rem;
    border-radius: 6px;
    text-decoration: none;
    margin-left: 5px;
  }

  .edit-btn {
    border: 1px solid #0d6efd;
    color: #0d6efd;
  }

  .delete-btn {
    border: 1px solid #dc3545;
    color: #dc3545;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .admin-stats {
      flex-direction: column;
    }
  }
</style>

<div class="admin-wrapper">
  <!-- Header -->
  <div class="admin-header"style="color: black;">
    <h3>Admin Dashboard</h3>
    <a href="{{ url_for('auth.create_user') }}" class="btn btn-primary">
      + Create User
    </a>
  </div>

  <!-- Table -->
  <div class="admin-table-container">
    <table>
      <thead>
        <tr>
          <th style="text-align: center; color: black">user id</th>
          <th style="text-align: center; color: black">Email</th>
          <th style="text-align: center; color: black">Role</th>
          <th style="text-align: center; color: black">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td style="text-align: center; color: black">{{ user.id }}</td>
          <td style="text-align: center; color: black">{{ user.email }}</td>

          <td style="text-align: center">
            <span class="role-badge"> {{ user.role }} </span>
          </td>

          <td style="text-align: center">
            <a
              href="{{ url_for('auth.edit_user', user_id=user.id) }}"
              class="action-btn edit-btn"
            >
              Edit
            </a>

            <a
              href="{{ url_for('auth.delete_user', user_id=user.id) }}"
              class="action-btn delete-btn"
              onclick="return confirm('Delete this user?');"
            >
              Delete
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
